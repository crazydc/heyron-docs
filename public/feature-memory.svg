<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="none"/>
  
  <!-- Brain/AI icon - brighter -->
  <circle cx="200" cy="130" r="60" fill="#00D9FF" opacity="0.15"/>
  <circle cx="200" cy="130" r="40" fill="#00D9FF" opacity="0.25"/>
  <circle cx="200" cy="130" r="20" fill="#00D9FF"/>
  
  <!-- Neural connections - brighter -->
  <circle cx="160" cy="90" r="8" fill="#00D9FF" opacity="0.8"/>
  <circle cx="240" cy="90" r="8" fill="#00D9FF" opacity="0.8"/>
  <circle cx="140" cy="150" r="8" fill="#00D9FF" opacity="0.8"/>
  <circle cx="260" cy="150" r="8" fill="#00D9FF" opacity="0.8"/>
  <circle cx="200" cy="180" r="8" fill="#00D9FF" opacity="0.8"/>
  
  <path d="M200 130 L160 90" stroke="#00D9FF" strokeWidth="2" opacity="0.5"/>
  <path d="M200 130 L240 90" stroke="#00D9FF" strokeWidth="2" opacity="0.5"/>
